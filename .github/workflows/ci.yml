name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend : lint + build + tests unitaires ────────────────────────────
  backend:
    name: Backend (lint · build · unit tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: ESLint
        run: npx eslint src --ext .ts --max-warnings 0

      - name: TypeScript build
        run: npm run build

      - name: Unit tests
        run: npm test -- tests/unit
        env:
          NODE_ENV: test

  # ─── Frontend : typecheck + build ────────────────────────────────────────
  frontend:
    name: Frontend (typecheck · build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript + Vite build
        run: npm run build

  # ─── Scanner Python : vérification syntaxique ───────────────────────────
  scanner:
    name: Scanner Python (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Syntax check (all modules)
        run: |
          python -m py_compile scanner/core/base_module.py
          find scanner/modules -name "*.py" -exec python -m py_compile {} +
