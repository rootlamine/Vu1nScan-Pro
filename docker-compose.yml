version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vulnscan-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       vulnscan
      POSTGRES_USER:     vulnscan
      POSTGRES_PASSWORD: vulnscan123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnscan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vulnscan-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: vulnscan-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
